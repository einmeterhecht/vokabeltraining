name: Process List Submission

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled

concurrency:
  group: process-list-submission-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  process-submission:
    if: contains(github.event.issue.labels.*.name, 'list-submission') && !contains(github.event.issue.labels.*.name, 'submission-processed')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Parse and validate issue payload
        id: parse
        run: |
          set -euo pipefail
          python3 scripts/process_list_submission.py \
            --repo-root . \
            --event-file "$GITHUB_EVENT_PATH" \
            --write \
            --output-json result.json \
            --github-output "$GITHUB_OUTPUT"

      - name: Commit generated list file
        id: commit
        if: steps.parse.outputs.valid == 'true'
        env:
          SUBMISSION_BRANCH: ${{ steps.parse.outputs.branch }}
          SUBMISSION_OUTPUT_FILE: ${{ steps.parse.outputs.output_file }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout -B "$SUBMISSION_BRANCH" origin/main
          git add "$SUBMISSION_OUTPUT_FILE"

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Process list submission #${{ github.event.issue.number }}"
            git push --force-with-lease origin "$SUBMISSION_BRANCH"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update PR, close issue and optionally auto-merge
        if: steps.parse.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          SUBMITTER_LOGIN: ${{ github.event.issue.user.login }}
          SUBMISSION_BRANCH: ${{ steps.parse.outputs.branch }}
          SUBMISSION_OUTPUT_FILE: ${{ steps.parse.outputs.output_file }}
          SUBMISSION_TARGET: ${{ steps.parse.outputs.target }}
          SUBMISSION_SLUG: ${{ steps.parse.outputs.slug }}
          SUBMISSION_QUESTION_COUNT: ${{ steps.parse.outputs.question_count }}
          SUBMISSION_CHANGED: ${{ steps.commit.outputs.changed }}
        run: |
          set -euo pipefail
          pr_number="$(gh pr list --head "$SUBMISSION_BRANCH" --base main --json number --jq '.[0].number // empty')"

          if [[ "$SUBMISSION_CHANGED" == "true" ]]; then
            body_prefix="Automatisch aktualisiert aus Issue #$ISSUE_NUMBER."
            if [[ -z "$pr_number" ]]; then
              body_prefix="Automatisch erzeugt aus Issue #$ISSUE_NUMBER."
            fi

            {
              printf '%s\n\n' "$body_prefix"
              printf '%s\n' "- Ziel: \`$SUBMISSION_TARGET\`"
              printf '%s\n' "- Datei: \`$SUBMISSION_OUTPUT_FILE\`"
              printf '%s\n' "- Fragen: $SUBMISSION_QUESTION_COUNT"
            } > pr_body.md

            if [[ -z "$pr_number" ]]; then
              gh pr create \
                --base main \
                --head "$SUBMISSION_BRANCH" \
                --title "List submission #$ISSUE_NUMBER: $SUBMISSION_SLUG" \
                --body-file pr_body.md
              pr_number="$(gh pr list --head "$SUBMISSION_BRANCH" --base main --json number --jq '.[0].number // empty')"
            else
              gh pr edit "$pr_number" \
                --title "List submission #$ISSUE_NUMBER: $SUBMISSION_SLUG" \
                --body-file pr_body.md
            fi
          fi

          if [[ -n "$pr_number" ]]; then
            pr_state="$(gh pr view "$pr_number" --json state --jq '.state')"
            pr_url="$(gh pr view "$pr_number" --json url --jq '.url')"

            merge_status="not-requested"
            merge_note=""

            if [[ "$SUBMITTER_LOGIN" == "einmeterhecht" && "$pr_state" == "OPEN" ]]; then
              set +e
              auto_merge_output="$(gh pr merge "$pr_number" --auto --squash --delete-branch 2>&1)"
              auto_merge_exit=$?
              set -e

              if [[ $auto_merge_exit -eq 0 ]]; then
                merge_status="auto-enabled"
              else
                merge_note="$auto_merge_output"
                set +e
                direct_merge_output="$(gh pr merge "$pr_number" --squash --delete-branch 2>&1)"
                direct_merge_exit=$?
                set -e

                if [[ $direct_merge_exit -eq 0 ]]; then
                  merge_status="merged"
                  merge_note=""
                else
                  merge_status="failed"
                  merge_note="$merge_note"$'\n'"$direct_merge_output"
                fi
              fi
            fi

            gh api "repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER" \
              --method PATCH \
              -f state=closed > /dev/null

            printf 'Die Einreichung wurde verarbeitet.\n\nPR: %s\n\nDas Issue wurde automatisch geschlossen.\n' "$pr_url" > issue_comment.md

            if [[ "$SUBMITTER_LOGIN" == "einmeterhecht" && "$merge_status" == "auto-enabled" ]]; then
              printf '\n%s\n' "Auto-Merge: aktiviert." >> issue_comment.md
            elif [[ "$SUBMITTER_LOGIN" == "einmeterhecht" && "$merge_status" == "merged" ]]; then
              printf '\n%s\n' "Auto-Merge: sofort zusammengefuehrt." >> issue_comment.md
            elif [[ "$SUBMITTER_LOGIN" == "einmeterhecht" && "$merge_status" == "failed" ]]; then
              {
                printf '\n%s\n\n%s\n' "Auto-Merge konnte nicht aktiviert werden." "Grund:"
                printf '```\n%s\n```\n' "$merge_note"
              } >> issue_comment.md
            fi

            gh issue comment "$ISSUE_NUMBER" --body-file issue_comment.md
          else
            printf '%s\n' 'Die Einreichung ist gueltig, erzeugt aber keine Aenderung gegenueber `main`. Es wurde daher kein PR erstellt.' > issue_comment.md
            gh issue comment "$ISSUE_NUMBER" --body-file issue_comment.md
          fi

          gh issue edit "$ISSUE_NUMBER" --add-label submission-processed --remove-label invalid-submission

      - name: Comment invalid submission
        if: steps.parse.outputs.valid != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          error_message="$(python3 -c 'import json; print(str((json.load(open("result.json", "r", encoding="utf-8")).get("error_message") or "")).strip())')"

          printf 'Die Einreichung konnte nicht verarbeitet werden.\n\nFehler:\n```\n%s\n```\n\nBitte korrigiere den JSON-Block im Issue und speichere das Issue erneut.\n' "$error_message" > invalid_comment.md

          gh issue comment "$ISSUE_NUMBER" --body-file invalid_comment.md
          gh issue edit "$ISSUE_NUMBER" --add-label invalid-submission --remove-label submission-processed
