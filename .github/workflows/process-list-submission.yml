name: Process List Submission

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled

concurrency:
  group: process-list-submission-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  process-submission:
    if: contains(github.event.issue.labels.*.name, 'list-submission') && !contains(github.event.issue.labels.*.name, 'submission-processed')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Parse and validate issue payload
        id: parse
        run: |
          set -euo pipefail
          python3 scripts/process_list_submission.py --repo-root . --event-file "$GITHUB_EVENT_PATH" --write --output-json result.json
          python3 - <<'PY'
          import json
          import os

          data = json.load(open("result.json", "r", encoding="utf-8"))
          is_valid = bool(data.get("valid"))

          def write_single_line_output(handle, name, value):
            text = "" if value is None else str(value)
            if "\n" in text or "\r" in text:
              raise ValueError(f"Output field must be single-line: {name}")
            handle.write(f"{name}={text}\n")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            write_single_line_output(fh, "valid", "true" if is_valid else "false")
            write_single_line_output(fh, "issue_number", data.get("issue_number", ""))
            write_single_line_output(fh, "branch", data.get("branch", ""))

            if is_valid:
              write_single_line_output(fh, "output_file", data.get("output_file", ""))
              write_single_line_output(fh, "question_count", data.get("question_count", 0))
              write_single_line_output(fh, "target", data.get("target", ""))
              write_single_line_output(fh, "slug", data.get("slug", ""))
            else:
              write_single_line_output(fh, "output_file", "")
              write_single_line_output(fh, "question_count", 0)
              write_single_line_output(fh, "target", "")
              write_single_line_output(fh, "slug", "")
          PY

      - name: Configure git
        if: steps.parse.outputs.valid == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit generated list file
        id: commit
        if: steps.parse.outputs.valid == 'true'
        env:
          SUBMISSION_BRANCH: ${{ steps.parse.outputs.branch }}
          SUBMISSION_OUTPUT_FILE: ${{ steps.parse.outputs.output_file }}
        run: |
          set -euo pipefail
          branch="$SUBMISSION_BRANCH"
          output_file="$SUBMISSION_OUTPUT_FILE"

          if [[ ! "$branch" =~ ^submission/issue-[0-9]+$ ]]; then
            echo "Unexpected branch format: $branch" >&2
            exit 1
          fi

          if [[ ! "$output_file" =~ ^abfragen/listen/[A-Za-z0-9._-]+/[A-Za-z0-9._-]+\.js$ ]]; then
            echo "Unexpected output path format: $output_file" >&2
            exit 1
          fi

          git fetch origin main
          git checkout -B "$branch" origin/main
          git add "$output_file"

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Process list submission #${{ github.event.issue.number }}"
            git push --force-with-lease origin "$branch"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update PR, close issue and optionally auto-merge
        if: steps.parse.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          SUBMITTER_LOGIN: ${{ github.event.issue.user.login }}
          SUBMISSION_BRANCH: ${{ steps.parse.outputs.branch }}
          SUBMISSION_OUTPUT_FILE: ${{ steps.parse.outputs.output_file }}
          SUBMISSION_TARGET: ${{ steps.parse.outputs.target }}
          SUBMISSION_SLUG: ${{ steps.parse.outputs.slug }}
          SUBMISSION_QUESTION_COUNT: ${{ steps.parse.outputs.question_count }}
          SUBMISSION_CHANGED: ${{ steps.commit.outputs.changed }}
        run: |
          set -euo pipefail
          issue_number="$ISSUE_NUMBER"
          submitter_login="$SUBMITTER_LOGIN"
          branch="$SUBMISSION_BRANCH"
          output_file="$SUBMISSION_OUTPUT_FILE"
          target="$SUBMISSION_TARGET"
          slug="$SUBMISSION_SLUG"
          question_count="$SUBMISSION_QUESTION_COUNT"
          changed="$SUBMISSION_CHANGED"

          if [[ ! "$branch" =~ ^submission/issue-[0-9]+$ ]]; then
            echo "Unexpected branch format: $branch" >&2
            exit 1
          fi

          if [[ ! "$output_file" =~ ^abfragen/listen/[A-Za-z0-9._-]+/[A-Za-z0-9._-]+\.js$ ]]; then
            echo "Unexpected output path format: $output_file" >&2
            exit 1
          fi

          pr_number="$(gh pr list --head "$branch" --base main --json number --jq '.[0].number // empty')"

          if [[ -z "$pr_number" && "$changed" == "true" ]]; then
            pr_body="Automatisch erzeugt aus Issue #$issue_number."
            pr_body+=$'\n\n'"- Ziel: \`$target\`"
            pr_body+=$'\n'"- Datei: \`$output_file\`"
            pr_body+=$'\n'"- Fragen: $question_count"

            gh pr create \
              --base main \
              --head "$branch" \
              --title "List submission #$issue_number: $slug" \
              --body "$pr_body"
            pr_number="$(gh pr list --head "$branch" --base main --json number --jq '.[0].number // empty')"
          elif [[ -n "$pr_number" && "$changed" == "true" ]]; then
            pr_body="Automatisch aktualisiert aus Issue #$issue_number."
            pr_body+=$'\n\n'"- Ziel: \`$target\`"
            pr_body+=$'\n'"- Datei: \`$output_file\`"
            pr_body+=$'\n'"- Fragen: $question_count"

            gh pr edit "$pr_number" \
              --title "List submission #$issue_number: $slug" \
              --body "$pr_body"
          fi

          if [[ -n "$pr_number" ]]; then
            pr_state="$(gh pr view "$pr_number" --json state --jq '.state')"
            pr_url="$(gh pr view "$pr_number" --json url --jq '.url')"

            merge_status="not-requested"
            merge_note=""

            if [[ "$submitter_login" == "einmeterhecht" && "$pr_state" == "OPEN" ]]; then
              set +e
              auto_merge_output="$(gh pr merge "$pr_number" --auto --squash --delete-branch 2>&1)"
              auto_merge_exit=$?
              set -e

              if [[ $auto_merge_exit -eq 0 ]]; then
                merge_status="auto-enabled"
              else
                merge_note="$auto_merge_output"
                set +e
                direct_merge_output="$(gh pr merge "$pr_number" --squash --delete-branch 2>&1)"
                direct_merge_exit=$?
                set -e

                if [[ $direct_merge_exit -eq 0 ]]; then
                  merge_status="merged"
                  merge_note=""
                else
                  merge_status="failed"
                  merge_note="$merge_note"$'\n'"$direct_merge_output"
                fi
              fi
            fi

            gh api "repos/$GITHUB_REPOSITORY/issues/$issue_number" \
              --method PATCH \
              -f state=closed > /dev/null

            printf '%s\n\n%s\n\n%s\n' \
              "Die Einreichung wurde verarbeitet." \
              "PR: $pr_url" \
              "Das Issue wurde automatisch geschlossen." > issue_comment.md

            if [[ "$submitter_login" == "einmeterhecht" && "$merge_status" == "auto-enabled" ]]; then
              printf '\n%s\n' "Auto-Merge: aktiviert." >> issue_comment.md
            elif [[ "$submitter_login" == "einmeterhecht" && "$merge_status" == "merged" ]]; then
              printf '\n%s\n' "Auto-Merge: sofort zusammengefuehrt." >> issue_comment.md
            elif [[ "$submitter_login" == "einmeterhecht" && "$merge_status" == "failed" ]]; then
              {
                printf '\n%s\n\n%s\n' "Auto-Merge konnte nicht aktiviert werden." "Grund:"
                printf '```\n%s\n```\n' "$merge_note"
              } >> issue_comment.md
            fi

            gh issue comment "$issue_number" --body-file issue_comment.md
          else
            cat > issue_comment.md <<EOF
          Die Einreichung ist gueltig, erzeugt aber keine Aenderung gegenueber \`main\`. Es wurde daher kein PR erstellt.
          EOF
            gh issue comment "$issue_number" --body-file issue_comment.md
          fi

          gh issue edit "$issue_number" --add-label submission-processed --remove-label invalid-submission

      - name: Comment invalid submission
        if: steps.parse.outputs.valid != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          issue_number="$ISSUE_NUMBER"

          python3 - <<'PY'
          import json
          from pathlib import Path

          result = json.loads(Path("result.json").read_text(encoding="utf-8"))
          error_message = str(result.get("error_message") or "").strip()

          comment = (
              "Die Einreichung konnte nicht verarbeitet werden.\n\n"
              "Fehler:\n"
              "```\n"
              f"{error_message}\n"
              "```\n\n"
              "Bitte korrigiere den JSON-Block im Issue und speichere das Issue erneut.\n"
          )

          Path("invalid_comment.md").write_text(comment, encoding="utf-8")
          PY

          gh issue comment "$issue_number" --body-file invalid_comment.md
          gh issue edit "$issue_number" --add-label invalid-submission --remove-label submission-processed
